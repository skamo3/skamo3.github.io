---
layout: default
---
<article class="project-detail">
  {% assign cat = site.data.categories[page.category] %}
  <span class="cat-badge" style="background:{{ cat.color }}22; color:{{ cat.color }};">{{ cat.label }}</span>
  <h1>{{ page.title }}</h1>
  <div class="meta">{{ page.period }} · {% if page.type == "company" %}회사 프로젝트{% else %}개인 & 교육 프로젝트{% endif %}</div>
  {{ content }}
</article>
