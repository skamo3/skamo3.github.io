---
layout: default
---
<article class="post-content">
  {% if page.category %}
  {% assign cat = site.data.blog_categories[page.category] %}
  <span class="cat-badge" style="background:{{ cat.color }}22; color:{{ cat.color }};">{{ cat.label }}</span>
  {% endif %}
  <h1>{{ page.title }}</h1>
  <div class="meta">{{ page.date | date: "%Y.%m.%d" }}{% if page.tags %} · {{ page.tags | join: ", " }}{% endif %}</div>
  {{ content }}
</article>
{% if page.mermaid %}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
  mermaid.initialize({ startOnLoad: true, theme });
</script>
{% endif %}
