<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg" font-family="'Poppins','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12141F"/>
      <stop offset="100%" stop-color="#1A1F18"/>
    </linearGradient>
  </defs>
  <rect width="700" height="450" fill="url(#bg)"/>

  <!-- viewport ground grid, right side, under the box -->
  <g stroke="#3A4030" stroke-width="1.5" opacity="0.6">
    <line x1="405" y1="192" x2="675" y2="192"/>
    <line x1="418" y1="175" x2="662" y2="175"/>
    <line x1="430" y1="160" x2="650" y2="160"/>
    <line x1="405" y1="192" x2="430" y2="160"/>
    <line x1="472" y1="192" x2="485" y2="160"/>
    <line x1="540" y1="192" x2="540" y2="160"/>
    <line x1="608" y1="192" x2="595" y2="160"/>
    <line x1="675" y1="192" x2="650" y2="160"/>
  </g>

  <!-- wireframe box, sitting on the grid -->
  <g stroke="#2EFF7C" stroke-width="4" fill="none" opacity="0.95">
    <polygon points="440,35 540,10 640,35 640,130 540,155 440,130" />
    <polygon points="440,35 540,65 540,155" />
    <polygon points="540,65 640,35" />
    <line x1="540" y1="65" x2="540" y2="10" />
  </g>
  <g stroke="#FFD400" stroke-width="2" fill="none" opacity="0.55">
    <line x1="440" y1="35" x2="540" y2="65" />
    <line x1="640" y1="35" x2="540" y2="65" />
  </g>

  <!-- transform gizmo, at the box's base pivot -->
  <g stroke-width="3.5" stroke-linecap="round">
    <line x1="540" y1="155" x2="580" y2="155" stroke="#F2494B"/>
    <polygon points="589,155 576,149 576,161" fill="#F2494B" stroke="none"/>
    <line x1="540" y1="155" x2="540" y2="112" stroke="#4CC2FF"/>
    <polygon points="540,103 534,116 546,116" fill="#4CC2FF" stroke="none"/>
    <line x1="540" y1="155" x2="565" y2="178" stroke="#2EFF7C"/>
    <polygon points="572,184 559,181 568,172" fill="#2EFF7C" stroke="none"/>
  </g>
  <circle cx="540" cy="155" r="4.5" fill="#EDF2E6"/>

  <text x="50" y="280" fill="#EDF2E6" font-size="86" font-weight="900">Engine-SIU</text>
  <text x="55" y="335" fill="#A3AC8F" font-size="30" font-weight="600">DirectX11 자체 게임엔진</text>
</svg>
