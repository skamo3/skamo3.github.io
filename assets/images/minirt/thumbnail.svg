<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg" font-family="'Poppins','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12141F"/>
      <stop offset="100%" stop-color="#1A1F18"/>
    </linearGradient>
    <radialGradient id="sphere" cx="35%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#FFF6D6"/>
      <stop offset="35%" stop-color="#FFD400"/>
      <stop offset="100%" stop-color="#7A4E00"/>
    </radialGradient>
  </defs>
  <rect width="700" height="450" fill="url(#bg)"/>

  <!-- checker floor hint, right area -->
  <g opacity="0.5">
    <rect x="430" y="205" width="42" height="42" fill="#2A3024"/>
    <rect x="472" y="205" width="42" height="42" fill="#171B14"/>
    <rect x="514" y="205" width="42" height="42" fill="#2A3024"/>
    <rect x="556" y="205" width="42" height="42" fill="#171B14"/>
    <rect x="598" y="205" width="42" height="42" fill="#2A3024"/>
    <rect x="430" y="247" width="42" height="42" fill="#171B14"/>
    <rect x="472" y="247" width="42" height="42" fill="#2A3024"/>
    <rect x="514" y="247" width="42" height="42" fill="#171B14"/>
    <rect x="556" y="247" width="42" height="42" fill="#2A3024"/>
    <rect x="598" y="247" width="42" height="42" fill="#171B14"/>
  </g>

  <!-- ray-traced sphere -->
  <circle cx="533" cy="112" r="72" fill="url(#sphere)"/>
  <circle cx="503" cy="82" r="14" fill="#FFFFFF" opacity="0.85"/>

  <!-- bounced/shadow ray from sphere to floor -->
  <line x1="562" y1="168" x2="580" y2="205" stroke="#FFD400" stroke-width="2" stroke-dasharray="4 5" opacity="0.55"/>

  <!-- camera icon, left side -->
  <g stroke="#FFD400" stroke-width="3.5" fill="#12141F">
    <rect x="52" y="98" width="80" height="46" rx="7"/>
    <rect x="96" y="85" width="24" height="16" rx="3"/>
    <circle cx="135" cy="121" r="21" fill="#12141F"/>
    <circle cx="135" cy="121" r="9" fill="#FFD400" stroke="none"/>
  </g>

  <!-- primary ray: camera -> sphere -->
  <line x1="160" y1="120" x2="452" y2="111" stroke="#EDF2E6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="461,110 440,101 440,120" fill="#EDF2E6"/>

  <text x="50" y="280" fill="#EDF2E6" font-size="86" font-weight="900">MiniRT</text>
  <text x="55" y="335" fill="#A3AC8F" font-size="30" font-weight="600">C로 구현한 Ray Tracing 렌더러</text>
</svg>
