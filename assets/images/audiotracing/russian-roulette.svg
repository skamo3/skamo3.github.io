<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', sans-serif">
  <rect width="760" height="320" fill="#12141F"/>

  <!-- Incoming ray -->
  <line x1="60" y1="30" x2="220" y2="150" stroke="#EDF2E6" stroke-width="3"/>
  <polygon points="220,150 206,140 213,156" fill="#EDF2E6"/>
  <text x="70" y="60" fill="#EDF2E6" font-size="14" font-weight="700">에너지 = 1</text>

  <!-- Surface -->
  <rect x="0" y="155" width="760" height="120" fill="#1A1F18" stroke="#3A4030" stroke-width="1.5"/>
  <text x="30" y="190" fill="#A3AC8F" font-size="14">흡수율 = 1/3</text>
  <text x="30" y="215" fill="#A3AC8F" font-size="14">난반사율 = 3/4</text>

  <!-- Branch point -->
  <circle cx="220" cy="155" r="4" fill="#EDF2E6"/>

  <!-- Absorbed branch (left, red) -->
  <line x1="220" y1="155" x2="140" y2="245" stroke="#FF5C5C" stroke-width="2.5"/>
  <text x="80" y="270" fill="#FF5C5C" font-size="13" font-weight="700">1/3 확률</text>
  <text x="80" y="288" fill="#FF5C5C" font-size="13" font-weight="700">소멸 (에너지=0)</text>
  <text x="112" y="238" fill="#FF5C5C" font-size="22" font-weight="700">✕</text>

  <!-- Survive branch (right, green) -->
  <line x1="220" y1="155" x2="420" y2="60" stroke="#2EFF7C" stroke-width="3"/>
  <polygon points="420,60 405,64 413,48" fill="#2EFF7C"/>
  <text x="430" y="55" fill="#2EFF7C" font-size="13" font-weight="700">2/3 확률로 생존</text>
  <text x="430" y="76" fill="#2EFF7C" font-size="13">에너지 = 1 ÷ (2/3) = 1.5</text>
  <text x="430" y="97" fill="#A3AC8F" font-size="12">(손실분을 생존 경로에 보정 — Russian Roulette)</text>

  <!-- Bottom note -->
  <rect x="24" y="285" width="712" height="0" fill="none"/>
  <text x="380" y="308" fill="#FFD400" font-size="13" text-anchor="middle" font-weight="700">기댓값 손실 없이 연산량만 줄이는 Monte Carlo 분산 감소 기법</text>
</svg>
