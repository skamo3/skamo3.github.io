{% assign cat = site.data.categories[include.p.category] %}
<a class="project-card js-project-card" href="{{ include.p.url | relative_url }}">
  <div class="thumb">
    {% if include.p.thumbnail %}
    <img src="{{ include.p.thumbnail | relative_url }}" alt="{{ include.p.title }}">
    {% else %}
    <span>이미지 준비 중</span>
    {% endif %}
  </div>
  <span class="cat-badge" style="background:{{ cat.color }}22; color:{{ cat.color }};">{{ cat.label }}</span>
  <h4>{{ include.p.title }}</h4>
  <p class="period">{{ include.p.period }}</p>
</a>
